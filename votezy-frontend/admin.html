<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Votezy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            secondary: '#7c3aed',
            dark: '#1e293b',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-dark text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex-shrink-0 flex items-center">
          <span class="text-2xl font-bold tracking-tight">Votezy Admin</span>
        </div>
        <div class="flex items-center space-x-4">
          <a href="dashboard.html" class="text-sm font-medium hover:text-gray-300 transition">Back to App</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full flex flex-col lg:flex-row gap-8">
    
    <!-- Left Column: Add Candidate -->
    <div class="lg:w-1/3">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h2 class="text-xl font-bold text-gray-900 mb-4">Register Candidate</h2>
        <form id="addCandidateForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Candidate Name</label>
            <input type="text" id="candidateName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Party Name</label>
            <input type="text" id="candidateParty" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
          </div>
          <button type="submit" class="w-full bg-dark hover:bg-gray-800 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors shadow-sm">
            Add Candidate
          </button>
        </form>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mt-6 border-t-4 border-t-red-500">
        <h2 class="text-xl font-bold text-gray-900 mb-4">Election Actions</h2>
        <form id="declareResultForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Election Title</label>
            <input type="text" id="electionName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none" placeholder="e.g. Presidential Election 2026">
          </div>
          <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors shadow-sm">
            Declare Results
          </button>
        </form>
      </div>
    </div>

    <!-- Right Column: Data & Results -->
    <div class="lg:w-2/3 space-y-8">
      
      <!-- Current Standings -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h2 class="text-xl font-bold text-gray-900 mb-4 border-b pb-2">Current Standings (Live)</h2>
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead>
              <tr>
                <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Candidate</th>
                <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Party</th>
                <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Votes</th>
              </tr>
            </thead>
            <tbody id="candidatesTableBody" class="bg-white divide-y divide-gray-200">
              <!-- Injected -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Past Results -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h2 class="text-xl font-bold text-gray-900 mb-4 border-b pb-2">Past Election Results</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="resultsGrid">
           <!-- Injected -->
        </div>
      </div>

    </div>

  </main>

  <script type="module" src="./js/admin.js"></script>
</body>
</html>
