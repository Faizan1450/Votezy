<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Votezy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            secondary: '#7c3aed',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex-shrink-0 flex items-center">
          <span class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary">Votezy</span>
        </div>
        <div class="flex items-center space-x-4">
          <span id="voterNameDisplay" class="text-sm font-medium text-gray-700 hidden sm:block"></span>
          <button id="logoutBtn" class="text-sm text-gray-500 hover:text-gray-900 transition-colors">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
    
    <div id="statusBanner" class="hidden mb-8 p-4 rounded-lg bg-green-50 text-green-700 border border-green-200">
      <div class="flex items-center">
        <svg class="h-5 w-5 mr-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
        <p class="font-medium">You have successfully cast your vote. Thank you for participating!</p>
      </div>
    </div>

    <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between">
      <div>
        <h2 class="text-3xl font-bold text-gray-900">Candidates</h2>
        <p class="mt-2 text-sm text-gray-600">Please review the candidates and cast your vote carefully. You can only vote once.</p>
      </div>
      <div class="mt-4 md:mt-0">
         <span id="voteStatusBadge" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-gray-100 text-gray-800">
           Status: Checking...
         </span>
      </div>
    </div>

    <!-- Candidate Grid -->
    <div id="candidatesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Injected via JS -->
      <div id="loadingIndicator" class="col-span-full py-12 flex justify-center">
        <svg class="animate-spin h-8 w-8 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 mt-auto">
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
      <p class="text-center text-sm text-gray-500">&copy; 2026 Votezy. All rights reserved. <a href="admin.html" class="text-primary hover:underline ml-2">Admin Panel</a></p>
    </div>
  </footer>

  <script type="module" src="./js/dashboard.js"></script>
</body>
</html>
